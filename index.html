<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@6..144,1..1000&display=swap');
    </style>
    <style>
        *{
            margin: 0px;
            padding: 0px;
            box-sizing: border-box;
        }

        html, body {
            background-color: rgb(56, 56, 56);
            font-family: "Google Sans Flex", sans-serif;
            color: white;
        }

        header {
            padding-top: 25px;
        }

        header > nav > ul{
            display: flex;
            flex-flow: row wrap;
            justify-content: flex-end;
            text-decoration: none;
            list-style: none;
            gap: 20px;
        }

        a{
            color: white;
            text-decoration: none;
            font-size: 0.8em;
        }

        a:hover {
            text-decoration: underline;
        }

        a > #grid{
            width: 30px;
            height: 30px;
        }

        a > #grid:hover {
            background-color: rgb(72, 72, 72);
            border-radius: 100%;
        }



        main {
            margin-top: 100px;
        }

        h1{
            font-size: 5.5em;
            font-weight: 500;
            text-align: center;
            margin-bottom: 40px;
        }

        h1 > span {
            font-size: 1.15em;
        }

        div {
            position: relative;
            width: 500px;
            margin: auto;
        }

        div > #lupa {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            width: 20px;
            height: 20px;
            
        }

        div > input {
            width:100%;
            
            padding: 12px 15px 12px 50px;
            border-radius: 25px;
            border: none;
            font-size: 18px;
        }

        footer {
            position: fixed;
            bottom: 0px;
            left: 0px;
            width: 100%;
            height: 120px;
            background-color: rgb(22, 22, 22);
        }

        footer > p {
            padding: 20px 0px 10px 20px;
        }
        
        footer > #linha {
            width: 100%;
            height: 2px;
            margin-bottom: 10px;
            background-color: rgb(50, 50, 50);
        }

        #container-footer {
           
        }

        .filho {
            display: block;
            margin: auto;
        }

        #fi1 {
            width: 430px;
            margin: auto;
        }

        #fi2 {
            width: 280px;
            margin: auto;
        }

        .filho > a {
            margin: 10px;
        }

        @media screen {
            
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="#">Gmail</a></li>
                <li><a href="#">Imagens</a></li>
                <li><a href="#"><img id="grid" src="img/border-none-solid-full.svg" alt="Grid"></a></li>
                <li><a href="#"><img src="" alt=""></a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section>
            <h1><span>G</span>oog<span>l</span>e</h1>
            <div>
                <img id="lupa" src="img/lupa.svg" alt="lupa">
                <input type="text" name="pesquisa" id="ipesquisa" placeholder="Pesquise no Google ou digite um URL">
            </div>          
            </section>
    </main>
    <footer>
        <p>Brasil</p>
        <div id="linha"></div>
        <div id="container-footer">
            <div class="filho" id="fi1">
                <a href="#">Sobre</a>
                <a href="#">Publicidade</a>
                <a href="#">Negócios</a>
                <a href="#">Como funciona a pesquisa</a>
            </div>
            <div class="filho" id="fi2">
                <a href="#">Privacidade</a>
                <a href="#">Termos</a>
                <a href="#">Configurações</a>
            </div>
        </div>
    </footer>
</body>
</html>
